<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RIDE | フレディちゃんねる</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:white;
    font-family:'Noto Sans JP', sans-serif;
    overflow-x:hidden;
}

/* =========================
HEADER
========================= */

header{
    position:fixed;
    top:0;
    width:100%;
    z-index:999;
    background:rgba(0,0,0,.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,.08);
}

.header-inner{
    width:95%;
    max-width:1400px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 0;
}

.logo{
    font-size:42px;
    font-weight:900;
    line-height:1;
}

.logo-main{
    color:white;
}

.logo-sub{
    font-size:14px;
    color:#ff0000;
    letter-spacing:3px;
    margin-top:5px;
}

nav ul{
    display:flex;
    gap:35px;
    list-style:none;
}

nav a{
    color:white;
    text-decoration:none;
    font-size:14px;
    font-weight:700;
    transition:.3s;
}

nav a:hover{
    color:#ff0000;
}

/* =========================
MAIN
========================= */

.ride-wrap{
    width:95%;
    max-width:1400px;
    margin:auto;
    padding:180px 0 100px;
}

.page-title{
    font-size:90px;
    font-family:'Anton', sans-serif;
    line-height:1;
    margin-bottom:15px;
}

.page-sub{
    color:#ff0000;
    font-size:18px;
    letter-spacing:3px;
    margin-bottom:70px;
}

/* =========================
ARTICLE GRID
========================= */

.article-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
}

.article-link{
    text-decoration:none;
    color:white;
}

.article-card{
    background:#111;
    border-radius:20px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.05);
    transition:.35s;
}

.article-card:hover{
    transform:translateY(-10px);
    box-shadow:0 15px 35px rgba(255,0,0,.2);
}

.article-card img{
    width:100%;
    height:240px;
    object-fit:cover;
}

.article-content{
    padding:25px;
}

.category{
    display:inline-block;
    padding:5px 14px;
    background:#ff0000;
    border-radius:30px;
    font-size:12px;
    font-weight:700;
    margin-bottom:18px;
}

.article-title{
    font-size:28px;
    font-weight:900;
    line-height:1.5;
    margin-bottom:18px;
}

.article-date{
    color:#888;
    font-size:14px;
}

/* =========================
FOOTER
========================= */

footer{
    margin-top:120px;
    padding:50px 20px;
    text-align:center;
    color:#666;
    border-top:1px solid rgba(255,255,255,.08);
}

/* =========================
RESPONSIVE
========================= */

@media(max-width:1100px){

.article-grid{
    grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:800px){

.article-grid{
    grid-template-columns:1fr;
}

.page-title{
    font-size:60px;
}

nav{
    display:none;
}

}

</style>
</head>

<body>

<!-- HEADER -->

<header>

<div class="header-inner">

<div class="logo">

<div class="logo-main">
フレディちゃんねる
</div>

<div class="logo-sub">
FREDDIE CHANNEL
</div>

</div>

<nav>

<ul>

<li><a href="article/about.html">ABOUT</a></li>

<li><a href="article/roadbike.html">ROAD BIKE</a></li>

<li><a href="article/ride.html">RIDE</a></li>

<li><a href="article/review.html">REVIEW</a></li>

<li><a href="article/guitar.html">GUITAR</a></li>

<li><a href="article/goods.html">GOODS</a></li>

</ul>

</nav>

</div>

</header>

<!-- MAIN -->

<div class="ride-wrap">

<h1 class="page-title">
RIDE
</h1>

<div class="page-sub">
ライド記事一覧
</div>

<!-- ARTICLE GRID -->

<div class="article-grid" id="ride-list">

</div>

</div>

<!-- FOOTER -->

<footer>

© 2026 フレディちゃんねる All Rights Reserved.

</footer>

<!-- SCRIPT -->

<script>

const articles = [

{
title:"奈良・又兵衛桜を巡る絶景ライド",
date:"2026.05.09",
image:"images/nara.jpg",
link:"article/nara-ride.html",
category:"RIDE"
},

{
title:"ビワイチ200kmロングライド記録",
date:"2026.04.20",
image:"images/biwaichi.jpg",
link:"article/biwaichi.html",
category:"RIDE"
},

{
title:"六甲ヒルクライム朝練",
date:"2026.04.12",
image:"images/rokko.jpg",
link:"article/rokko.html",
category:"RIDE"
},

{
title:"淡路島グルメライド",
date:"2026.03.30",
image:"images/awaji.jpg",
link:"article/awaji.html",
category:"RIDE"
},

{
title:"桜満開の京都ライド",
date:"2026.03.25",
image:"images/kyoto.jpg",
link:"article/kyoto.html",
category:"RIDE"
}

];

const rideList = document.getElementById("ride-list");

articles
.filter(article => article.category === "RIDE")
.forEach(article => {

rideList.innerHTML += `

<a href="${article.link}" class="article-link">

<div class="article-card">

<img src="${article.image}">

<div class="article-content">

<div class="category">
${article.category}
</div>

<div class="article-title">
${article.title}
</div>

<div class="article-date">
${article.date}
</div>

</div>

</div>

</a>

`;

});

</script>

</body>
</html>
